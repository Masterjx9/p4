name: Publish NPM SDK

on:
  workflow_dispatch:
  release:
    types:
      - published
  push:
    branches:
      - main
    paths:
      - ".github/workflows/publish-npm.yml"
      - "bindings/javascript/package.json"
      - "bindings/javascript/pp2p_core.js"
      - "bindings/javascript/pp2p_core.d.ts"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    defaults:
      run:
        working-directory: bindings/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Verify package tarball
        run: npm pack --dry-run

      - name: Publish package
        env:
          NPM_ACCESS_TOKEN: ${{ secrets.NPM_ACCESS_TOKEN }}
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "Version $NAME@$VERSION already published; skipping."
            exit 0
          fi

          unset NODE_AUTH_TOKEN
          if npm publish --access public --provenance; then
            echo "Published via trusted publisher."
            exit 0
          fi

          if [ -n "${NPM_ACCESS_TOKEN}" ]; then
            export NODE_AUTH_TOKEN="${NPM_ACCESS_TOKEN}"
            npm publish --access public --provenance
            echo "Published via token fallback."
            exit 0
          fi

          echo "Trusted publish failed and NPM_ACCESS_TOKEN is not configured."
          exit 1
